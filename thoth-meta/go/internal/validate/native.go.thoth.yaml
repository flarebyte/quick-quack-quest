locator: internal/validate/native.go
meta:
  purpose: Implement native file-based validation and type inference without DuckDB.
  responsibilities: Read CSV/JSON/NDJSON (with compression), infer field types, and validate schema compatibility.
  architecture_notes: Native path intentionally excludes parquet and uses conservative type promotion rules.
  function_list:
    - decompressReader
    - inferStringType
    - inferValueType
    - inspectCSV
    - inspectJSON
    - inspectNDJSON
    - inspectNativeFile
    - promoteType
    - validateWithNative
  import_files_list:
    - bufio
    - compress/gzip
    - encoding/csv
    - encoding/json
    - fmt
    - github.com/flarebyte/quick-quack-quest/internal/config
    - github.com/klauspost/compress/zstd
    - io
    - os
    - strconv
    - strings
    - time
  language: go
